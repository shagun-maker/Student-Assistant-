<!DOCTYPE html>
<html>

<head>

    <title>Student AI Assistant</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Student AI Assistant</h1>

        <input type="text" id="name" placeholder="Student Name">

        <input type="text" id="course" placeholder="Course">

        <input type="number" id="marks" placeholder="Marks">

        <input type="number" id="attendance" placeholder="Attendance">

        <button onclick="addStudent()">

            Start AI Interview

        </button>

        <hr>

        <h2>Interview Status</h2>

        <div id="students"></div>
        <pre id="interview-response"></pre>

    </div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
